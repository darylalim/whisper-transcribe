[project]
name = "asr-pipeline"
version = "0.2.0"
description = "Transcribe audio files using the MLX Whisper turbo model on Apple Silicon."
requires-python = ">=3.12"
dependencies = [
    "docling[asr]",
    "streamlit",
]

[dependency-groups]
dev = [
    "pytest",
    "ty",
    "ruff",
]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.isort]
combine-as-imports = true

[tool.ty.environment]
python-version = "3.12"
