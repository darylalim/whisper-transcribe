[server]
maxUploadSize = 500

# Indigo/zinc theme shared across light and dark modes. Defining both
# [theme.light] and [theme.dark] keeps the light/dark switcher in the
# app's settings menu available to users.
[theme]
font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
baseFontSize = 14
baseRadius = "8px"
linkUnderline = false
headingFontWeights = [600, 600, 600, 500, 500, 500]

[theme.light]
primaryColor = "#6366f1"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f4f4f5"
textColor = "#18181b"
borderColor = "#e4e4e7"
linkColor = "#4f46e5"

[theme.dark]
primaryColor = "#6366f1"
backgroundColor = "#18181b"
secondaryBackgroundColor = "#27272a"
textColor = "#fafafa"
borderColor = "#3f3f46"
linkColor = "#818cf8"
