name: Draft release

# Drafts a GitHub Release whenever the version in pyproject.toml changes on main.
# The release is created as a *draft* with auto-generated notes so you can review
# and edit it before publishing. Idempotent: skips if the tag already exists.
on:
  push:
    branches: [main]
    paths:
      - pyproject.toml

# Write access is needed to create the tag and the (draft) release.
permissions:
  contents: write

concurrency:
  group: draft-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  draft-release:
    name: Draft release on version bump
    # Plain ubuntu (unlike CI's macos-14): this job only reads the version string
    # and calls the GitHub API — it never runs `uv sync`, so the absent
    # mlx-whisper Linux wheels are irrelevant here.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Read version from pyproject.toml
        id: version
        run: |
          version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ -z "$version" ]; then
            echo "::error::Could not read project.version from pyproject.toml"
            exit 1
          fi
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Draft release if the tag does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to draft."
            exit 0
          fi
          gh release create "$TAG" \
            --draft \
            --title "$TAG" \
            --target "$GITHUB_SHA" \
            --generate-notes
          echo "Drafted release $TAG at $GITHUB_SHA."
